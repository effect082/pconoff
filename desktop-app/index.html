<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC ON/OFF 설정 (데스크탑)</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background: #f0f4f8;
            padding: 2rem;
            color: #333;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input, select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #2563eb; }
        #msg { margin-top: 1rem; text-align: center; color: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PC 모니터링 초기 설정</h1>
        <p style="color: #666; margin-bottom: 1.5rem;">GAS 웹앱 URL과 직원 정보를 입력하세요.</p>

        <div class="form-group">
            <label>Google Apps Script URL</label>
            <input type="text" id="gasUrl" placeholder="https://script.google.com/macros/s/.../exec">
        </div>

        <div class="form-group">
            <label>부서</label>
            <input type="text" id="dept" placeholder="직접 입력 (예: 영업부)">
        </div>

        <div class="form-group">
            <label>이름</label>
            <input type="text" id="name" placeholder="본인 이름">
        </div>

        <button id="btnSave">저장 및 시작</button>
        <div id="msg"></div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
