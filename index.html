<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC ON/OFF 모니터링 - 로그인</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container login-container glass-panel">
        <div class="login-header">
            <h1>PC ON/OFF 모니터링</h1>
            <p class="text-muted">출퇴근 관리를 위해 로그인해주세요.</p>
        </div>

        <!-- GAS URL Setup Form (Hidden if already set) -->
        <div id="setupForm" style="display: none;">
            <div class="form-group">
                <label for="gasUrl">Google Apps Script URL</label>
                <input type="text" id="gasUrl" class="form-control" placeholder="https://script.google.com/macros/s/.../exec">
                <small class="text-muted mt-2 block">최초 1회 설정이 필요합니다.</small>
            </div>
            <button id="btnSaveUrl" class="btn btn-primary btn-block">저장 및 초기화</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="nav-tabs" style="margin-bottom: 1.5rem; justify-content: center;">
                <div class="nav-item active" id="navEmp" onclick="switchLoginTab('employee')">직원 로그인</div>
                <div class="nav-item" id="navAdm" onclick="switchLoginTab('admin')">관리자 로그인</div>
            </div>

            <div id="employeeFields">
                <div class="form-group">
                    <label for="dept">부서</label>
                    <input type="text" id="dept" class="form-control" placeholder="직접 입력 (예: 영업부)">
                </div>

                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" class="form-control" placeholder="이름을 입력하세요">
                </div>
            </div>

            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" class="form-control" placeholder="이름을 입력하세요">
            </div>

            <div class="form-group">
                <label for="password">비밀번호 (숫자 4자리)</label>
                <input type="password" id="password" class="form-control" maxlength="4" placeholder="****">
            </div>

            <button id="btnLogin" class="btn btn-primary btn-block mb-4">로그인</button>
            
            <div class="text-center">
                <a href="#" id="linkRegister" class="text-muted">처음이신가요? 직원 등록하기</a>
            </div>
        </div>

        <!-- Register Form (Hidden initially) -->
        <div id="registerForm" style="display: none;">
            <div class="form-group">
                <label for="regDept">부서</label>
                <input type="text" id="regDept" class="form-control" placeholder="직접 입력 (예: 영업부)">
            </div>

            <div class="form-group">
                <label for="regName">이름</label>
                <input type="text" id="regName" class="form-control" placeholder="이름을 입력하세요">
            </div>

            <div class="form-group">
                <label for="regRank">직급</label>
                <input type="text" id="regRank" class="form-control" placeholder="예: 사원, 대리, 과장">
            </div>

            <div class="form-group">
                <label for="regPassword">비밀번호 (숫자 4자리)</label>
                <input type="password" id="regPassword" class="form-control" maxlength="4" placeholder="****">
            </div>

            <button id="btnRegister" class="btn btn-primary btn-block mb-4">등록하기</button>
            
            <div class="text-center">
                <a href="#" id="linkLogin" class="text-muted">이미 등록하셨나요? 로그인하기</a>
            </div>
        </div>
        
        <div id="statusMessage" class="text-center mt-4"></div>
    </div>

    <script src="js/crypto.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Page specific logic
        document.addEventListener('DOMContentLoaded', () => {
            const setupForm = document.getElementById('setupForm');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            
            // Check if GAS URL is set
            if (!App.getGasUrl()) {
                setupForm.style.display = 'block';
                loginForm.style.display = 'none';
            }

            document.getElementById('btnSaveUrl').addEventListener('click', async () => {
                const url = document.getElementById('gasUrl').value.trim();
                if (url) {
                    App.setGasUrl(url);
                    App.showMessage('URL 저장 중...', 'text-muted');
                    // Try to initialize sheets
                    const res = await App.apiCall({ action: 'init' });
                    if (res && res.success) {
                        App.showMessage('초기화 완료. 로그인해주세요.', 'text-success');
                        setupForm.style.display = 'none';
                        loginForm.style.display = 'block';
                    } else {
                        App.showMessage('URL 확인 필요 또는 서버 오류.', 'text-error');
                        localStorage.removeItem('gasUrl');
                    }
                }
            });

            document.getElementById('linkRegister').addEventListener('click', (e) => {
                e.preventDefault();
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
            });

            document.getElementById('linkLogin').addEventListener('click', (e) => {
                e.preventDefault();
                registerForm.style.display = 'none';
                loginForm.style.display = 'block';
            });

            let currentTab = 'employee';
            window.switchLoginTab = function(tab) {
                currentTab = tab;
                document.getElementById('navEmp').classList.toggle('active', tab === 'employee');
                document.getElementById('navAdm').classList.toggle('active', tab === 'admin');
                document.getElementById('employeeFields').style.display = tab === 'employee' ? 'block' : 'none';
                document.getElementById('linkRegister').parentElement.style.display = tab === 'employee' ? 'block' : 'none';
            };

            document.getElementById('btnLogin').addEventListener('click', async () => {
                let dept = '';
                let name = '';
                let isAdmin = false;

                if (currentTab === 'employee') {
                    dept = document.getElementById('dept').value.trim();
                    name = document.getElementById('name').value.trim();
                } else {
                    dept = 'admin';
                    name = 'admin';
                    isAdmin = true;
                }
                
                const pwd = document.getElementById('password').value;

                if (!dept || !name || !pwd) {
                    App.showMessage('모든 필드를 입력하세요.', 'text-error');
                    return;
                }

                const hash = await window.sha256(pwd);
                App.showMessage('로그인 중...', 'text-muted');
                
                const res = await App.apiCall({
                    action: 'login',
                    dept,
                    name,
                    passwordHash: hash,
                    isAdmin: isAdmin
                });

                if (res && res.success) {
                    App.showMessage('로그인 성공', 'text-success');
                    if (res.role === 'admin') {
                        sessionStorage.setItem('isAdmin', 'true');
                        window.location.href = 'admin.html';
                    } else {
                        sessionStorage.setItem('user', JSON.stringify(res.user));
                        window.location.href = 'employee.html';
                    }
                } else {
                    App.showMessage(res ? res.message : '오류가 발생했습니다.', 'text-error');
                }
            });

            document.getElementById('btnRegister').addEventListener('click', async () => {
                const dept = document.getElementById('regDept').value;
                const name = document.getElementById('regName').value.trim();
                const rank = document.getElementById('regRank').value.trim();
                const pwd = document.getElementById('regPassword').value;

                if (!dept || !name || !rank || !pwd) {
                    App.showMessage('모든 필드를 입력하세요.', 'text-error');
                    return;
                }

                if (!/^\d{4}$/.test(pwd)) {
                    App.showMessage('비밀번호는 숫자 4자리여야 합니다.', 'text-error');
                    return;
                }

                const hash = await window.sha256(pwd);
                App.showMessage('등록 중...', 'text-muted');

                const res = await App.apiCall({
                    action: 'register',
                    dept,
                    name,
                    rank,
                    passwordHash: hash
                });

                if (res && res.success) {
                    App.showMessage('등록 완료! 로그인해주세요.', 'text-success');
                    registerForm.style.display = 'none';
                    loginForm.style.display = 'block';
                } else {
                    App.showMessage(res ? res.message : '오류가 발생했습니다.', 'text-error');
                }
            });
        });
    </script>
</body>
</html>
